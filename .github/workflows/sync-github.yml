name: Sync GitHub data

on:
  schedule:
    - cron: "23 4 * * *"   # daily 04:23 UTC
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "scripts/sync-github.mjs"
      - ".github/workflows/sync-github.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: node scripts/sync-github.mjs

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain _pages)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _pages
            git commit -m "chore: sync projects + CV from GitHub [skip ci]"
            git push
          else
            echo "No changes."
          fi
